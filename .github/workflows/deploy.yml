# push(main)ごとに Next を静的エクスポート → GitHub Pages へ公開。
# Framer移行に伴い Netlify から GitHub Pages へ切替（2026-07-22）。
# 公開物は /demo/[slug]（裸のライブデモ）と /videos/*.mp4（録画）。
# 辞典の front-end は Framer CMS 側。ここはデモ/動画のホストに徹する。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate content
        run: npm run validate

      - name: Build (static export)
        run: npm run build

      - name: Add .nojekyll (serve _next assets)
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
