# push(main)ごとに検証→Netlify本番デプロイ。
# 毎朝のアニメデモルーティンが public/daily/ にpushするだけでサイトが更新される。
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate content
        run: npm run validate

      - name: Deploy to Netlify
        run: npx netlify-cli@17 deploy --build --prod --message "GitHub Actions ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
